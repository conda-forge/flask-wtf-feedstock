{% set name = "Flask-WTF" %}
{% set version = "1.2.2" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/flask_wtf-{{ version }}.tar.gz
  sha256: 79d2ee1e436cf570bccb7d916533fa18757a2f18c290accffab1b9a0b684666b

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 1

requirements:
  host:
    - python {{ python_min }}
    - hatchling
    - pip
  run:
    - python >={{ python_min }}
    - flask
    - wtforms
    - itsdangerous

test:
  requires:
    - pip
    - python {{ python_min }}
  imports:
    - flask_wtf
    - flask_wtf.recaptcha
  commands:
    - pip check

about:
  home: https://github.com/wtforms/flask-wtf
  license: BSD-3-Clause
  license_family: BSD
  license_file: LICENSE.rst
  summary: Simple integration of Flask and WTForms
  dev_url: https://github.com/wtforms/flask-wtf
  doc_url: https://pythonhosted.org/Flask-WTF/

extra:
  recipe-maintainers:
    - pmlandwehr
    - xylar
